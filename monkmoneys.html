<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkMoneys - Financial Tracker</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // Emerald 500
                        secondary: '#0f172a', // Slate 900
                        expense: '#f43f5e', // Rose 500
                        income: '#10b981', // Emerald 500
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Hilangkan panah spinner bawaan jika menggunakan input number (sekarang pakai text) */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden flex flex-col selection:bg-primary selection:text-white">

    <!-- ================== LOGIN PAGE ================== -->
    <div id="login-page"
        class="flex flex-col items-center justify-center min-h-screen bg-slate-50 absolute inset-0 z-50">
        <div
            class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 w-11/12 max-w-md text-center border border-slate-100">
            <div
                class="bg-primary w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg shadow-primary/30 rotate-3">
                <i class="ph ph-wallet text-3xl text-white -rotate-3"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">MonkMoneys</h1>
            <p class="text-slate-500 mb-8 text-sm">Catat keuangan harianmu dengan mudah.</p>

            <button id="btn-login"
                class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 hover:border-slate-300 text-slate-700 font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
                Sign in with Google
            </button>
            <p id="login-error" class="text-red-500 text-xs mt-4 hidden bg-red-50 p-3 rounded-lg border border-red-100">
            </p>
        </div>
    </div>

    <!-- ================== MAIN APP (DASHBOARD) ================== -->
    <div id="app-container" class="hidden flex-col h-screen w-full overflow-hidden">

        <!-- TOP NAVBAR -->
        <header
            class="bg-white border-b border-slate-200 sticky top-0 z-30 px-4 py-3 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2.5">
                <div class="bg-primary p-1.5 rounded-lg shadow-sm shadow-primary/30">
                    <i class="ph ph-wallet text-white text-xl leading-none"></i>
                </div>
                <h2 class="text-lg font-bold text-slate-800 tracking-tight">MonkMoneys</h2>
            </div>

            <div class="flex items-center gap-3">
                <div class="hidden sm:block text-right">
                    <p id="user-name" class="text-sm font-semibold text-slate-700 leading-tight">User Name</p>
                </div>
                <img id="user-avatar" src="" alt="User"
                    class="w-9 h-9 rounded-full border-2 border-slate-100 object-cover">
                <div class="w-px h-6 bg-slate-200 mx-1"></div>
                <button id="btn-logout"
                    class="text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 p-2 rounded-lg transition"
                    title="Logout">
                    <i class="ph ph-sign-out text-xl"></i>
                </button>
            </div>
        </header>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 overflow-y-auto bg-[#f4f7fb] p-4 sm:p-6 custom-scrollbar pb-24">
            <div class="max-w-5xl mx-auto space-y-5">

                <!-- HEADER & FILTER -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <div>
                        <h1 class="text-xl font-bold text-slate-800">Overview</h1>
                    </div>
                    <div
                        class="w-full sm:w-auto flex items-center bg-white border border-slate-200 rounded-xl px-3 py-2 shadow-sm">
                        <i class="ph ph-calendar-blank text-slate-400 mr-2 text-lg"></i>
                        <!-- Input Month: YYYY-MM -->
                        <input type="month" id="filter-month"
                            class="bg-transparent text-sm font-medium text-slate-700 focus:outline-none w-full cursor-pointer">
                    </div>
                </div>

                <!-- SUMMARY CARDS -->
                <div class="grid grid-cols-2 gap-3 sm:gap-4">
                    <!-- Balance -->
                    <div
                        class="col-span-2 sm:col-span-1 bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex items-center justify-between relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-50 rounded-full opacity-50"></div>
                        <div class="relative z-10">
                            <p class="text-slate-500 text-xs font-semibold mb-1 uppercase tracking-wider">Total Balance
                            </p>
                            <h3 id="total-balance"
                                class="text-2xl sm:text-3xl font-extrabold text-slate-800 tracking-tight">Rp 0</h3>
                        </div>
                        <div
                            class="relative z-10 w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-2xl shadow-inner">
                            <i class="ph ph-scales"></i>
                        </div>
                    </div>

                    <!-- Income -->
                    <div
                        class="col-span-1 bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-slate-100 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2">
                        <div class="order-2 sm:order-1">
                            <p
                                class="text-slate-500 text-[11px] sm:text-xs font-semibold mb-0.5 uppercase tracking-wider">
                                Income</p>
                            <h3 id="total-income" class="text-lg sm:text-xl font-bold text-income">Rp 0</h3>
                        </div>
                        <div
                            class="order-1 sm:order-2 w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-lg sm:text-xl">
                            <i class="ph ph-trend-up"></i>
                        </div>
                    </div>

                    <!-- Expense -->
                    <div
                        class="col-span-1 bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-slate-100 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2">
                        <div class="order-2 sm:order-1">
                            <p
                                class="text-slate-500 text-[11px] sm:text-xs font-semibold mb-0.5 uppercase tracking-wider">
                                Expense</p>
                            <h3 id="total-expense" class="text-lg sm:text-xl font-bold text-expense">Rp 0</h3>
                        </div>
                        <div
                            class="order-1 sm:order-2 w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center text-lg sm:text-xl">
                            <i class="ph ph-trend-down"></i>
                        </div>
                    </div>
                </div>

                <!-- MIDDLE SECTION: CHART & ADD FORM -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

                    <!-- ADD TRANSACTION FORM -->
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 lg:col-span-1">
                        <h3
                            class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-3">
                            <i class="ph ph-plus-circle text-primary text-xl"></i> Add Record
                        </h3>
                        <form id="transaction-form" class="space-y-4">
                            <div>
                                <div class="grid grid-cols-2 gap-2 p-1 bg-slate-100 rounded-lg">
                                    <label class="cursor-pointer">
                                        <input type="radio" name="type" value="income" class="peer sr-only" checked>
                                        <div
                                            class="text-center text-sm font-medium py-2 rounded-md text-slate-500 peer-checked:bg-white peer-checked:text-emerald-600 peer-checked:shadow-sm transition-all duration-200">
                                            Income</div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="radio" name="type" value="expense" class="peer sr-only">
                                        <div
                                            class="text-center text-sm font-medium py-2 rounded-md text-slate-500 peer-checked:bg-white peer-checked:text-rose-600 peer-checked:shadow-sm transition-all duration-200">
                                            Expense</div>
                                    </label>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div class="col-span-2 sm:col-span-1 lg:col-span-2">
                                    <label
                                        class="block text-xs font-semibold text-slate-500 mb-1 ml-1 uppercase">Date</label>
                                    <input type="date" id="input-date" required
                                        class="w-full bg-slate-50 border border-slate-200 text-slate-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 focus:bg-white transition">
                                </div>
                                <div class="col-span-2 sm:col-span-1 lg:col-span-2">
                                    <label
                                        class="block text-xs font-semibold text-slate-500 mb-1 ml-1 uppercase">Amount</label>
                                    <div class="relative">
                                        <span
                                            class="absolute left-3 top-2.5 text-slate-400 text-sm font-medium">Rp</span>
                                        <!-- Menggunakan tipe teks agar bisa diketik dengan format titik -->
                                        <input type="text" inputmode="numeric" id="input-amount" placeholder="0"
                                            required
                                            class="w-full bg-slate-50 border border-slate-200 text-slate-700 rounded-xl pl-10 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 focus:bg-white transition font-semibold">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label
                                    class="block text-xs font-semibold text-slate-500 mb-1 ml-1 uppercase">Description</label>
                                <input type="text" id="input-desc" placeholder="e.g. Salary, Groceries" required
                                    class="w-full bg-slate-50 border border-slate-200 text-slate-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 focus:bg-white transition">
                            </div>

                            <button type="submit"
                                class="w-full bg-primary hover:bg-emerald-600 text-white font-semibold py-3 rounded-xl transition duration-200 flex justify-center items-center gap-2 shadow-sm shadow-primary/40 mt-2">
                                <i class="ph ph-floppy-disk text-lg"></i> Save Record
                            </button>
                        </form>
                    </div>

                    <!-- CHART -->
                    <div
                        class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 lg:col-span-2 flex flex-col justify-center">
                        <h3 class="text-base font-bold text-slate-800 mb-2 flex items-center gap-2">
                            <i class="ph ph-chart-pie-slice text-primary text-xl"></i> Analytics
                        </h3>
                        <div class="flex-1 relative w-full h-40 sm:h-56 flex justify-center items-center">
                            <canvas id="financeChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- TRANSACTION LIST -->
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                        <h3 class="text-base font-bold text-slate-800 flex items-center gap-2">
                            <i class="ph ph-list-bullets text-primary text-xl"></i> Records
                        </h3>
                    </div>

                    <div class="overflow-x-auto pb-2">
                        <table class="w-full text-left border-collapse min-w-[500px]">
                            <thead>
                                <tr class="text-slate-400 text-xs uppercase tracking-wider border-b border-slate-100">
                                    <th class="py-2 px-2 font-semibold w-24">Date & Time</th>
                                    <th class="py-2 px-2 font-semibold">Description</th>
                                    <th class="py-2 px-2 font-semibold text-right">Amount</th>
                                    <th class="py-2 px-2 font-semibold text-center w-16">Action</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list" class="divide-y divide-slate-50 text-sm">
                                <!-- Data Injected via JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div
                        class="mt-4 flex flex-col sm:flex-row justify-between items-center gap-3 pt-3 border-t border-slate-100">
                        <span id="page-info" class="text-xs text-slate-500 font-medium">Showing 0 to 0 of 0</span>
                        <div class="flex gap-2">
                            <button id="btn-prev"
                                class="px-3 py-1.5 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition text-xs font-semibold">Prev</button>
                            <button id="btn-next"
                                class="px-3 py-1.5 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition text-xs font-semibold">Next</button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- ================== JAVASCRIPT ================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBjSFTzEBMnFp-fwHd8la-nzpQmELAbjaI",
            authDomain: "monkmoneys.firebaseapp.com",
            projectId: "monkmoneys",
            storageBucket: "monkmoneys.firebasestorage.app",
            messagingSenderId: "125909022151",
            appId: "1:125909022151:web:706e0a076ad9b75052d5e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allTransactions = [];
        let filteredTransactions = [];
        let currentChart = null;

        const ITEMS_PER_PAGE = 30;
        let currentPage = 1;
        const currentAppId = 'default_monkmoneys';

        const loginPage = document.getElementById('login-page');
        const appContainer = document.getElementById('app-container');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const loginErrorMsg = document.getElementById('login-error');

        const form = document.getElementById('transaction-form');
        const inputDate = document.getElementById('input-date');
        const inputAmount = document.getElementById('input-amount');
        const filterMonth = document.getElementById('filter-month');

        // Set Default Date & Month
        const today = new Date();
        filterMonth.value = today.toISOString().slice(0, 7);
        inputDate.value = today.toISOString().slice(0, 10);

        // --- FORMAT INPUT NOMINAL (TITIK OTOMATIS) ---
        inputAmount.addEventListener('input', function (e) {
            // Hapus semua karakter yang bukan angka
            let value = this.value.replace(/[^0-9]/g, '');
            if (value !== '') {
                // Konversi string angka menjadi format lokal indonesia (dengan pemisah titik)
                this.value = parseInt(value, 10).toLocaleString('id-ID');
            } else {
                this.value = '';
            }
        });

        // --- AUTHENTICATION ---
        btnLogin.addEventListener('click', async () => {
            try {
                loginErrorMsg.classList.add('hidden');
                btnLogin.disabled = true;
                btnLogin.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Loading...';

                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (error) {
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> Sign in with Google';
                loginErrorMsg.innerText = "Login Gagal. Silahkan Coba Lagi.";
                loginErrorMsg.classList.remove('hidden');
            }
        });

        btnLogout.addEventListener('click', async () => await signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginPage.classList.add('hidden');
                appContainer.classList.replace('hidden', 'flex');

                const firstName = user.displayName ? user.displayName.split(' ')[0] : 'User';
                document.getElementById('user-name').innerText = `Hi, ${firstName}`;
                document.getElementById('user-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}&background=10b981&color=fff`;

                fetchTransactions();
            } else {
                currentUser = null;
                loginPage.classList.remove('hidden');
                appContainer.classList.replace('flex', 'hidden');
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> Sign in Google';
                allTransactions = [];
                applyFiltersAndPagination();
            }
        });

        // --- DATABASE OPERATIONS ---
        function getTransactionCollection() {
            return collection(db, 'artifacts', currentAppId, 'users', currentUser.uid, 'transactions');
        }

        let unsubscribeSnapshot = null;
        function fetchTransactions() {
            if (!currentUser) return;
            const q = query(getTransactionCollection());

            if (unsubscribeSnapshot) unsubscribeSnapshot();
            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                allTransactions = [];
                snapshot.forEach((doc) => allTransactions.push({ id: doc.id, ...doc.data() }));

                // MENGURUTKAN DATA DARI TERLAMA (Ascending) KE TERBARU
                allTransactions.sort((a, b) => {
                    const timeA = a.timestamp || a.date;
                    const timeB = b.timestamp || b.date;
                    return timeA.localeCompare(timeB);
                });

                applyFiltersAndPagination();
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const type = document.querySelector('input[name="type"]:checked').value;
            const desc = document.getElementById('input-desc').value;
            const dateVal = document.getElementById('input-date').value;

            // Hapus titik untuk disimpan murni sebagai string angka
            const rawAmountStr = inputAmount.value.replace(/\./g, '');

            // Dapatkan waktu saat ini
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');

            // Buat Timestamp ISO berdasarkan tanggal input dan waktu sekarang agar pengurutan akurat
            const [year, month, day] = dateVal.split('-');
            const exactDate = new Date(year, month - 1, day, now.getHours(), now.getMinutes(), now.getSeconds());
            const timestampStr = exactDate.toISOString();

            try {
                const btn = form.querySelector('button[type="submit"]');
                const origHtml = btn.innerHTML;
                btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Saving...';
                btn.disabled = true;

                // Simpan ke Firebase (semua berupa String)
                await addDoc(getTransactionCollection(), {
                    type: type,
                    date: dateVal, // Hanya YYYY-MM-DD
                    time: timeStr, // Hanya HH:MM
                    timestamp: timestampStr, // Format ISO lengkap untuk sorting
                    description: desc,
                    amount: rawAmountStr
                });

                document.getElementById('input-desc').value = '';
                document.getElementById('input-amount').value = '';
                btn.innerHTML = origHtml;
                btn.disabled = false;
            } catch (error) {
                alert("Gagal menyimpan data.");
            }
        });

        window.deleteTransaction = async (docId) => {
            if (confirm("Hapus catatan ini?")) {
                await deleteDoc(doc(db, 'artifacts', currentAppId, 'users', currentUser.uid, 'transactions', docId));
            }
        };

        // --- FILTERING & CALCULATION ---
        filterMonth.addEventListener('change', () => { currentPage = 1; applyFiltersAndPagination(); });

        function applyFiltersAndPagination() {
            const filterValue = filterMonth.value;
            filteredTransactions = filterValue ? allTransactions.filter(trx => trx.date.startsWith(filterValue)) : [...allTransactions];
            calculateTotals();
            renderTable();
            updateChart();
        }

        function formatRp(num) {
            if (window.innerWidth < 640 && Math.abs(num) >= 1000000) {
                return 'Rp ' + (num / 1000000).toFixed(1).replace('.0', '') + 'M';
            }
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        }

        function calculateTotals() {
            let income = 0; let expense = 0;
            filteredTransactions.forEach(trx => {
                const amt = parseInt(trx.amount, 10) || 0;
                trx.type === 'income' ? income += amt : expense += amt;
            });
            const balance = income - expense;

            document.getElementById('total-income').innerText = formatRp(income);
            document.getElementById('total-expense').innerText = formatRp(expense);
            document.getElementById('total-balance').innerText = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(balance);

            const balEl = document.getElementById('total-balance');
            balEl.className = balance < 0 ? "text-2xl sm:text-3xl font-extrabold text-expense tracking-tight" : "text-2xl sm:text-3xl font-extrabold text-slate-800 tracking-tight";
        }

        // --- PAGINATION & TABLE RENDER ---
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        btnPrev.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderTable(); } });
        btnNext.addEventListener('click', () => { if (currentPage < Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE)) { currentPage++; renderTable(); } });

        function renderTable() {
            const tbody = document.getElementById('transaction-list');
            tbody.innerHTML = '';
            const totalItems = filteredTransactions.length;
            const maxPage = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;

            if (currentPage > maxPage) currentPage = maxPage;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, totalItems);
            const pageData = filteredTransactions.slice(startIndex, endIndex);

            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-6 text-center text-slate-400 text-xs">Belum ada catatan di bulan ini.</td></tr>`;
            } else {
                pageData.forEach(trx => {
                    const isIncome = trx.type === 'income';
                    const dateObj = new Date(trx.date);
                    const dateDisplay = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
                    // Tampilkan Waktu, fallback 00:00 jika data lama belum ada waktunya
                    const timeDisplay = trx.time || "00:00";

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition border-b border-slate-50/50">
                            <td class="py-3 px-2 whitespace-nowrap">
                                <div class="text-xs font-bold text-slate-600">${dateDisplay}</div>
                                <div class="text-[10px] text-slate-400 font-medium tracking-wide mt-0.5"><i class="ph ph-clock mr-1"></i>${timeDisplay}</div>
                            </td>
                            <td class="py-3 px-2">
                                <div class="font-medium text-slate-700">${trx.description}</div>
                                <span class="text-[10px] uppercase font-bold tracking-wider ${isIncome ? 'text-emerald-500' : 'text-rose-500'}">${trx.type}</span>
                            </td>
                            <td class="py-3 px-2 text-right font-bold text-sm ${isIncome ? 'text-income' : 'text-expense'}">
                                ${isIncome ? '+' : '-'}${new Intl.NumberFormat('id-ID').format(parseInt(trx.amount, 10))}
                            </td>
                            <td class="py-3 px-2 text-center">
                                <button onclick="deleteTransaction('${trx.id}')" class="bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 p-1.5 rounded-md transition" title="Delete">
                                    <i class="ph ph-trash text-base"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            document.getElementById('page-info').innerText = totalItems === 0 ? `0 records` : `${startIndex + 1}-${endIndex} of ${totalItems}`;
            btnPrev.disabled = currentPage === 1;
            btnNext.disabled = currentPage === maxPage || totalItems === 0;
        }

        // --- CHART JS ---
        function updateChart() {
            const ctx = document.getElementById('financeChart').getContext('2d');
            let totalInc = 0; let totalExp = 0;
            filteredTransactions.forEach(trx => {
                const amt = parseInt(trx.amount, 10) || 0;
                trx.type === 'income' ? totalInc += amt : totalExp += amt;
            });

            if (currentChart) currentChart.destroy();

            if (totalInc === 0 && totalExp === 0) {
                currentChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['Kosong'], datasets: [{ data: [1], backgroundColor: ['#f1f5f9'], borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { tooltip: { enabled: false }, legend: { display: false } }, cutout: '75%' }
                });
                return;
            }

            currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Income', 'Expense'],
                    datasets: [{ data: [totalInc, totalExp], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0, hoverOffset: 4 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8, font: { family: 'Inter', size: 11 } } },
                        tooltip: { callbacks: { label: (ctx) => ' Rp ' + new Intl.NumberFormat('id-ID').format(ctx.parsed) } }
                    }
                }
            });
        }
    </script>
</body>

</html>
